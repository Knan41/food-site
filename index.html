<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <nav class="navbar">
          <div class="logo">
            <img src="img/Mask Group.png" alt="burger" />
            <span class="food">food</span>
            <span class="wagon">waGon</span>
          </div>

          <div class="location">
            <span class="deliver">Deliver to:</span>
            <img src="img/map-marker-alt.png" alt="map" />
            <span>map-marker-alt Current Location </span
            ><span class="bus">Mohammadpur Bus Stand, Dhaka</span>
          </div>

          <div class="right-side">
            <img src="img/Search.png" alt="search" />
            <span
              ><a style="text-decoration: none; color: black" href=""
                >Search Food</a
              ></span
            >

            <button class="user">
              <img src="img/user.png" alt="user" /> Login
            </button>
          </div>
        </nav>
      </header>

      <section class="section-head">
        <div class="starving">
          <div class="star">
            <h1>Are you starving?</h1>
            <p>Within a few clicks, find meals that are accessible near you</p>
          </div>

          <div>
            <div class="bttn">
              <button class="deli"><img src="img/Icon.png" />Delivery</button>
              <button class="pickup">
                <img src="img/Icon (1).png" />Pickup
              </button>
            </div>

            <div class="input">
              <div class="input-2">
                <label for="inpt">
                  <img src="img/Icon (2).png" />
                </label>
                <input id="inpt" type="text" placeholder="Enter Your Address" />
              </div>

              <button><img src="img/Icon (3).png" />Find Food</button>
            </div>
          </div>
        </div>

        <div class="layer">
          <img src="img/Image Base.png" alt="" />
        </div>
      </section>

      <section class="section-menu">
        <div class="menu">
          <div class="salad salad-1">
            <img src="img/Food Photo (2).png" alt="" />

            <div class="text">
              <span>Greys Vage</span>
              <p>6 Days Remaining</p>
            </div>
          </div>

          <div class="salad salad-2">
            <img src="img/Food Photo.png" alt="" />

            <div class="text">
              <span>Greys Vage</span>
              <p>6 Days Remaining</p>
            </div>
          </div>

          <div class="salad salad-3">
            <img src="img/Image (1).png" alt="" />

            <div class="text">
              <span>Greys Vage</span>
              <p>6 Days Remaining</p>
            </div>
          </div>

          <div class="salad salad-4">
            <img src="img/Food Photo (1).png" alt="" />

            <div class="text">
              <span>Greys Vage</span>
              <p>6 Days Remaining</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
